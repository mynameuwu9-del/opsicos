<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opsicos Monitor</title>
  <style>
    :root {
      --bg-primary: #1a1d29;
      --bg-secondary: #252a3a;
      --bg-card: #2d3748;
      --text-primary: #ffffff;
      --text-secondary: #a0aec0;
      --text-muted: #718096;
      --success: #48bb78;
      --warning: #ed8936;
      --danger: #f56565;
      --border: #4a5568;
      --accent: #4299e1;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      margin-bottom: 30px;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
    }

    .back-btn {
      display: flex;
      align-items: center;
      color: var(--text-secondary);
      text-decoration: none;
      margin-right: 20px;
      padding: 8px 12px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    .website-status {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 30px;
      border: 1px solid var(--border);
    }

    .status-header {
      display: flex;
      align-items: center;
      justify-content: between;
      margin-bottom: 20px;
    }

    .status-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--success);
    }

    .status-indicator.warning { background: var(--warning); }
    .status-indicator.danger { background: var(--danger); }

    .service-name {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .service-url {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-left: 4px;
    }

    .status-actions {
      display: flex;
      gap: 12px;
    }

    .status-btn {
      padding: 6px 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .status-btn:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .status-card {
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 16px;
      border: 1px solid var(--border);
    }

    .status-card h3 {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .status-value {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .status-value.success { color: var(--success); }
    .status-value.warning { color: var(--warning); }
    .status-value.danger { color: var(--danger); }

    .status-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .uptime-graph {
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 16px;
      border: 1px solid var(--border);
    }

    .graph-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .graph-title {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .graph-percentage {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--success);
    }

    .graph-bars {
      display: flex;
      gap: 2px;
      height: 32px;
      margin-bottom: 8px;
    }

    .graph-bar {
      flex: 1;
      background: var(--success);
      border-radius: 2px;
      opacity: 0.8;
    }

    .graph-bar.down {
      background: var(--danger);
    }

    .graph-summary {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .bots-section {
      margin-top: 40px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .search-box {
      padding: 8px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      width: 250px;
    }

    .search-box::placeholder {
      color: var(--text-muted);
    }

    .bots-grid {
      display: grid;
      gap: 16px;
    }

    .bot-card {
      background: var(--bg-card);
      border-radius: 8px;
      padding: 20px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }

    .bot-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .bot-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .bot-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg-secondary);
    }

    .bot-info h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .bot-model {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .bot-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 16px;
    }

    .bot-stat {
      text-align: center;
    }

    .bot-stat-value {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .bot-stat-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }

    .error {
      background: var(--danger);
      color: white;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
    }
  </style>

  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="#" class="back-btn" onclick="history.back()">← Monitoring</a>
      <h1>Opsicos Monitor</h1>
    </div>

    <!-- Website Status Section -->
    <div class="website-status">
      <div class="status-header">
        <div class="status-title">
          <div class="status-indicator" id="website-indicator"></div>
          <div>
            <div class="service-name">Opsicos Web <span class="service-url">HTTP/S monitor for https://opsicos.onrender.com</span></div>
          </div>
        </div>
        <div class="status-actions">
          <button class="status-btn">🔔 Test Notification</button>
          <button class="status-btn">⏸️ Pause</button>
          <button class="status-btn">⚙️ Edit</button>
        </div>
      </div>

      <div class="status-grid">
        <div class="status-card">
          <h3>Current status</h3>
          <div class="status-value success" id="current-status">Up</div>
          <div class="status-subtitle" id="uptime-duration">Currently up for 1mo 6d 21h</div>
        </div>
        
        <div class="status-card">
          <h3>Last check</h3>
          <div class="status-value" id="last-check">Coming soon</div>
          <div class="status-subtitle">Checked every 5 minutes</div>
        </div>
        
        <div class="status-card">
          <h3>Last 24 hours</h3>
          <div class="uptime-graph">
            <div class="graph-header">
              <div class="graph-percentage" id="website-24h-percentage">100%</div>
            </div>
            <div class="graph-bars" id="website-graph-bars"></div>
            <div class="graph-summary" id="website-graph-summary">0 incidents, 0m down</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bots Section -->
    <div class="bots-section">
      <div class="section-header">
        <h2 class="section-title">Discord Bots</h2>
        <input type="text" class="search-box" placeholder="Search bots..." id="bot-search">
      </div>
      
      <div id="loading" class="loading">Loading bots...</div>
      <div id="error" class="error" style="display: none;"></div>
      <div id="bots-container" class="bots-grid"></div>
    </div>
  </div>

  <script>
    let websiteData = null;
    let botsData = [];
    let filteredBots = [];

    // Initialize page
    document.addEventListener('DOMContentLoaded', function() {
      loadWebsiteStatus();
      loadBots();
      setupSearch();
      
      // Auto-refresh every 30 seconds
      setInterval(() => {
        loadWebsiteStatus();
        loadBots();
      }, 30000);
    });

    // Load website status
    async function loadWebsiteStatus() {
      try {
        const response = await fetch('/api/monitor/website');
        if (response.ok) {
          websiteData = await response.json();
          updateWebsiteStatus();
        }
      } catch (error) {
        console.error('Error loading website status:', error);
      }
    }

    // Load bots data
    async function loadBots() {
      try {
        const response = await fetch('/api/monitor/bots');
        if (response.ok) {
          botsData = await response.json();
          filteredBots = [...botsData];
          updateBotsDisplay();
        }
      } catch (error) {
        console.error('Error loading bots:', error);
        document.getElementById('error').textContent = 'Failed to load bots data';
        document.getElementById('error').style.display = 'block';
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    // Update website status display
    function updateWebsiteStatus() {
      if (!websiteData) return;

      const indicator = document.getElementById('website-indicator');
      const status = document.getElementById('current-status');
      const uptime = document.getElementById('uptime-duration');
      const lastCheck = document.getElementById('last-check');
      const percentage = document.getElementById('website-24h-percentage');
      const summary = document.getElementById('website-graph-summary');

      // Update status
      if (websiteData.status === 'online') {
        indicator.className = 'status-indicator';
        status.textContent = 'Up';
        status.className = 'status-value success';
      } else {
        indicator.className = 'status-indicator danger';
        status.textContent = 'Down';
        status.className = 'status-value danger';
      }

      uptime.textContent = websiteData.uptimeDuration || 'Currently up for 1mo 6d 21h';
      lastCheck.textContent = websiteData.lastCheck || 'Coming soon';
      percentage.textContent = websiteData.uptimePercentage || '100%';
      summary.textContent = `${websiteData.incidents || 0} incidents, ${websiteData.downtime || '0m'} down`;

      // Generate graph bars
      generateWebsiteGraph();
    }

    // Generate website uptime graph
    function generateWebsiteGraph() {
      const container = document.getElementById('website-graph-bars');
      const bars = [];

      // Generate 24 bars for 24 hours (like GenAura interface)
      for (let i = 0; i < 24; i++) {
        const isUp = Math.random() > 0.01; // 99% uptime simulation
        bars.push(`<div class="graph-bar ${isUp ? '' : 'down'}" title="Hour ${i}: ${isUp ? 'Online' : 'Offline'}"></div>`);
      }

      container.innerHTML = bars.join('');
    }

    // Generate bot uptime graph
    function generateBotGraph(botId, uptimeData) {
      const container = document.querySelector(`#bot-graph-${botId}`);
      if (!container) return;

      const bars = [];

      // Generate 24 bars for 24 hours
      for (let i = 0; i < 24; i++) {
        const isUp = uptimeData && uptimeData[i] ? uptimeData[i] === 1 : Math.random() > 0.05; // 95% uptime simulation
        bars.push(`<div class="graph-bar ${isUp ? '' : 'down'}" title="Hour ${i}: ${isUp ? 'Online' : 'Offline'}"></div>`);
      }

      container.innerHTML = bars.join('');
    }

    // Update bots display
    function updateBotsDisplay() {
      const container = document.getElementById('bots-container');
      
      if (filteredBots.length === 0) {
        container.innerHTML = '<div class="loading">No bots found</div>';
        return;
      }

      const botsHTML = filteredBots.map(bot => `
        <div class="bot-card" onclick="openBotDetails('${bot._id}')">
          <div class="bot-header">
            <img src="${bot.botAvatar || '/images/default-bot.png'}" alt="${bot.botName}" class="bot-avatar">
            <div class="bot-info">
              <h3>${bot.botName}</h3>
              <div class="bot-model">${bot.displayModelName}</div>
            </div>
            <div class="status-indicator ${bot.status === 'online' ? '' : 'danger'}"></div>
          </div>

          <div class="bot-stats">
            <div class="bot-stat">
              <div class="bot-stat-value ${bot.status === 'online' ? 'success' : 'danger'}">${bot.status === 'online' ? 'Up' : 'Down'}</div>
              <div class="bot-stat-label">Current Status</div>
            </div>
            <div class="bot-stat">
              <div class="bot-stat-value">${formatUptime(bot.currentUptime || 0)}</div>
              <div class="bot-stat-label">Uptime</div>
            </div>
            <div class="bot-stat">
              <div class="bot-stat-value">${bot.serverCount || 0}</div>
              <div class="bot-stat-label">Servers</div>
            </div>
            <div class="bot-stat">
              <div class="bot-stat-value">${bot.last24hPercentage || 99}%</div>
              <div class="bot-stat-label">24h Uptime</div>
            </div>
          </div>

          <!-- 24h Uptime Graph -->
          <div class="uptime-graph" style="margin-top: 16px;">
            <div class="graph-header">
              <div class="graph-title">Last 24 hours</div>
              <div class="graph-percentage">${bot.last24hPercentage || 99}%</div>
            </div>
            <div class="graph-bars" id="bot-graph-${bot._id}"></div>
            <div class="graph-summary">${bot.incidents24h || 0} incidents, ${bot.downtime24h || 0}m down</div>
          </div>
        </div>
      `).join('');

      container.innerHTML = botsHTML;

      // Generate graphs for each bot after DOM update
      setTimeout(() => {
        filteredBots.forEach(bot => {
          generateBotGraph(bot._id, bot.hourlyUptime);
        });
      }, 100);
    }

    // Setup search functionality
    function setupSearch() {
      const searchBox = document.getElementById('bot-search');
      searchBox.addEventListener('input', function(e) {
        const query = e.target.value.toLowerCase();
        filteredBots = botsData.filter(bot => 
          bot.botName.toLowerCase().includes(query) ||
          bot.displayModelName.toLowerCase().includes(query)
        );
        updateBotsDisplay();
      });
    }

    // Open bot details page
    function openBotDetails(botId) {
      window.location.href = `/opsicos-monitor/bot/${botId}`;
    }

    // Format uptime duration
    function formatUptime(ms) {
      if (!ms) return '0m';
      
      const seconds = Math.floor(ms / 1000);
      const minutes = Math.floor(seconds / 60);
      const hours = Math.floor(minutes / 60);
      const days = Math.floor(hours / 24);
      
      if (days > 0) return `${days}d ${hours % 24}h`;
      if (hours > 0) return `${hours}h ${minutes % 60}m`;
      if (minutes > 0) return `${minutes}m`;
      return `${seconds}s`;
    }
  </script>
</body>
</html>
