<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Management - Opsicos</title>
  <link rel="canonical" href="https://opsicos.genaura.xyz/knowledge">
  <style>
    :root {
      --primary: #8B0000;
      --primary-dark: #660000;
      --secondary: #CCCCCC;
      --dark: #1a1a1a;
      --darker: #000000;
      --text-primary: #FFFFFF;
      --text-secondary: #CCCCCC;
      --background: #000000;
      --surface: #1a1a1a;
      --border: #333333;
      --success: #28a745;
      --error: #dc3545;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      line-height: 1.6;
      color: var(--text-secondary);
      background-color: var(--background);
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    
    .header h1 {
      color: var(--text-primary);
      font-size: 2rem;
      font-weight: 600;
    }
    
    .bot-selector {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .bot-selector select {
      background: var(--surface);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
    }

    .bot-selector select option {
      background: var(--surface);
      color: var(--text-primary);
      padding: 8px 12px;
    }
    
    .knowledge-form {
      background: var(--surface);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 30px;
      border: 1px solid var(--border);
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      color: var(--text-primary);
      font-weight: 500;
      margin-bottom: 8px;
    }
    
    .form-group input {
      width: 100%;
      background: var(--dark);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      transition: border-color 0.3s ease;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .textarea-container {
      position: relative;
    }
    
    .knowledge-textarea {
      width: 100%;
      min-height: 200px;
      background: var(--dark);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5;
      resize: vertical;
      transition: border-color 0.3s ease;
    }
    
    .knowledge-textarea:focus {
      outline: none;
      border-color: var(--primary);
      color: var(--text-primary);
    }
    
    .knowledge-textarea::placeholder {
      color: #666;
    }
    
    .char-counter {
      position: absolute;
      bottom: 12px;
      right: 16px;
      background: var(--darker);
      color: var(--text-secondary);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .char-counter.warning {
      color: #ffc107;
    }
    
    .char-counter.danger {
      color: var(--error);
    }
    
    .form-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
    }
    
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-primary {
      background: var(--primary);
      color: var(--text-primary);
    }
    
    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }
    
    .btn-secondary {
      background: var(--surface);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    
    .btn-secondary:hover {
      background: var(--dark);
      color: var(--text-primary);
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }
    
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    
    .alert-success {
      background: rgba(40, 167, 69, 0.1);
      color: var(--success);
      border: 1px solid rgba(40, 167, 69, 0.3);
    }
    
    .alert-error {
      background: rgba(220, 53, 69, 0.1);
      color: var(--error);
      border: 1px solid rgba(220, 53, 69, 0.3);
    }
    
    .loading {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top: 2px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .back-link {
      color: var(--text-secondary);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      transition: color 0.3s ease;
    }
    
    .back-link:hover {
      color: var(--primary);
    }
    
    @media (max-width: 768px) {
      .container {
        padding: 15px;
      }
      
      .header {
        flex-direction: column;
        gap: 15px;
        align-items: flex-start;
      }
      
      .form-actions {
        flex-direction: column;
        gap: 10px;
      }
      
      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>

  <!-- Theme Loader - Load theme immediately AFTER inline styles -->
  <link rel="stylesheet" href="/css/theme-switcher.css">
  <script src="/js/theme-loader.js"></script>
</head>
<body>
  <div class="container">
    <div style="display: flex; gap: 20px; margin-bottom: 20px;">
      <a href="/dashboard" class="back-link">← Dashboard</a>
      <a href="/docs" class="back-link">📚 Documentation</a>
      <a href="/knowledge" class="back-link" style="color: var(--primary);">Knowledge Management</a>
      <a href="/stored-knowledge" class="back-link">Stored Knowledge</a>
      <a href="/behavior" class="back-link">🎭 Bot Behavior</a>
      <a href="/bot-smartness" class="back-link">🧠 Bot's Smartness</a>
      <a href="/uptime-status" class="back-link">📊 Uptime Status</a>
      <a href="/features" class="back-link">🔧 Features</a>
      <a href="/special-users" class="back-link">👥 Special Users</a>
      <a href="/playground" class="back-link">🎮 Playground</a>
    </div>
    
    <div class="header">
      <h1>Knowledge Management</h1>
      <div class="bot-selector">
        <label for="botSelect">Select Bot:</label>
        <select id="botSelect">
          <option value="">Loading bots...</option>
        </select>
      </div>
    </div>
    
    <div id="alertContainer"></div>
    
    <div class="knowledge-form">
      <form id="knowledgeForm">
        <div class="form-group">
          <label for="knowledgeTitle">Knowledge Title</label>
          <input type="text" id="knowledgeTitle" placeholder="Enter a descriptive title for this knowledge entry" maxlength="200" required>
        </div>
        
        <div class="form-group">
          <label for="knowledgeContent">Knowledge Content</label>
          <div class="textarea-container">
            <textarea 
              id="knowledgeContent" 
              class="knowledge-textarea" 
              placeholder="Enter the knowledge content that your bot should learn and use in responses..."
              maxlength="10000"
              required
            ></textarea>
            <div class="char-counter" id="charCounter">0 / 10000</div>
          </div>
        </div>
        
        <div class="form-actions">
          <div>
            <a href="/stored-knowledge" class="btn btn-secondary">View Stored Knowledge</a>
          </div>
          <div>
            <button type="button" id="clearBtn" class="btn btn-secondary">Clear</button>
            <button type="submit" id="saveBtn" class="btn btn-primary">
              <span id="saveText">Save Knowledge</span>
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script>
    let currentBotId = null;
    let isEditing = false;
    let editingKnowledgeId = null;

    // Initialize page
    document.addEventListener('DOMContentLoaded', function() {
      loadBots();
      setupEventListeners();
      
      // Check if editing from URL params
      const urlParams = new URLSearchParams(window.location.search);
      const botId = urlParams.get('botId');
      const knowledgeId = urlParams.get('edit');
      
      if (botId) {
        currentBotId = botId;
      }
      
      if (knowledgeId) {
        isEditing = true;
        editingKnowledgeId = knowledgeId;
      }
    });

    function setupEventListeners() {
      const textarea = document.getElementById('knowledgeContent');
      const charCounter = document.getElementById('charCounter');
      const form = document.getElementById('knowledgeForm');
      const clearBtn = document.getElementById('clearBtn');
      const botSelect = document.getElementById('botSelect');

      // Character counter
      textarea.addEventListener('input', function() {
        const count = this.value.length;
        const max = 10000;
        charCounter.textContent = `${count} / ${max}`;
        
        if (count > max * 0.9) {
          charCounter.classList.add('danger');
          charCounter.classList.remove('warning');
        } else if (count > max * 0.8) {
          charCounter.classList.add('warning');
          charCounter.classList.remove('danger');
        } else {
          charCounter.classList.remove('warning', 'danger');
        }
      });

      // Form submission
      form.addEventListener('submit', handleFormSubmit);
      
      // Clear button
      clearBtn.addEventListener('click', function() {
        if (confirm('Are you sure you want to clear all fields?')) {
          form.reset();
          textarea.dispatchEvent(new Event('input'));
          isEditing = false;
          editingKnowledgeId = null;
          updateSaveButton();
        }
      });
      
      // Bot selection
      botSelect.addEventListener('change', function() {
        currentBotId = this.value;
        if (isEditing && currentBotId) {
          loadKnowledgeForEditing();
        }
      });
    }

    async function loadBots() {
      try {
        const response = await fetch('/bots', {
          credentials: 'include'
        });
        
        if (!response.ok) {
          throw new Error('Failed to load bots');
        }
        
        const bots = await response.json();
        const botSelect = document.getElementById('botSelect');
        
        botSelect.innerHTML = '<option value="">Select a bot...</option>';
        
        bots.forEach(bot => {
          const option = document.createElement('option');
          option.value = bot._id;
          option.textContent = bot.botName || 'Unnamed Bot';
          if (bot._id === currentBotId) {
            option.selected = true;
          }
          botSelect.appendChild(option);
        });
        
        if (currentBotId && isEditing) {
          loadKnowledgeForEditing();
        }
      } catch (error) {
        console.error('Error loading bots:', error);
        showAlert('Failed to load bots. Please refresh the page.', 'error');
      }
    }

    async function loadKnowledgeForEditing() {
      if (!editingKnowledgeId || !currentBotId) return;
      
      try {
        const response = await fetch(`/knowledge/${currentBotId}?limit=100`, {
          credentials: 'include'
        });
        
        if (!response.ok) {
          throw new Error('Failed to load knowledge');
        }
        
        const data = await response.json();
        const knowledge = data.knowledge.find(k => k._id === editingKnowledgeId);
        
        if (knowledge) {
          document.getElementById('knowledgeTitle').value = knowledge.title;
          document.getElementById('knowledgeContent').value = knowledge.content;
          document.getElementById('knowledgeContent').dispatchEvent(new Event('input'));
          updateSaveButton();
        }
      } catch (error) {
        console.error('Error loading knowledge for editing:', error);
        showAlert('Failed to load knowledge for editing.', 'error');
      }
    }

    async function handleFormSubmit(e) {
      e.preventDefault();
      
      if (!currentBotId) {
        showAlert('Please select a bot first.', 'error');
        return;
      }

      console.log('🔍 Submitting knowledge for bot:', currentBotId);

      const title = document.getElementById('knowledgeTitle').value.trim();
      const content = document.getElementById('knowledgeContent').value.trim();

      if (!title || !content) {
        showAlert('Please fill in both title and content.', 'error');
        return;
      }
      
      const saveBtn = document.getElementById('saveBtn');
      const saveText = document.getElementById('saveText');
      
      saveBtn.disabled = true;
      saveText.innerHTML = '<div class="loading"><div class="spinner"></div>Saving...</div>';
      
      try {
        const url = isEditing
          ? `/knowledge/${currentBotId}/${editingKnowledgeId}`
          : `/knowledge/${currentBotId}`;

        const method = isEditing ? 'PUT' : 'POST';

        console.log('🔍 Making API request:', { url, method, botId: currentBotId });

        const response = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json'
          },
          credentials: 'include',
          body: JSON.stringify({
            title,
            content
          })
        });

        console.log('📡 API response status:', response.status);
        
        const result = await response.json();
        
        if (!response.ok) {
          throw new Error(result.error || 'Failed to save knowledge');
        }
        
        showAlert(
          isEditing ? 'Knowledge updated successfully!' : 'Knowledge saved successfully!', 
          'success'
        );
        
        // Reset form if creating new knowledge
        if (!isEditing) {
          document.getElementById('knowledgeForm').reset();
          document.getElementById('knowledgeContent').dispatchEvent(new Event('input'));
        }
        
      } catch (error) {
        console.error('Error saving knowledge:', error);
        showAlert(error.message, 'error');
      } finally {
        saveBtn.disabled = false;
        updateSaveButton();
      }
    }

    function updateSaveButton() {
      const saveText = document.getElementById('saveText');
      saveText.textContent = isEditing ? 'Update Knowledge' : 'Save Knowledge';
    }

    function showAlert(message, type) {
      const alertContainer = document.getElementById('alertContainer');
      const alert = document.createElement('div');
      alert.className = `alert alert-${type}`;
      alert.textContent = message;
      
      alertContainer.innerHTML = '';
      alertContainer.appendChild(alert);
      
      // Auto-hide success alerts
      if (type === 'success') {
        setTimeout(() => {
          alert.remove();
        }, 5000);
      }
    }
  </script>
  <script src="/js/language-translator.js"></script>
</body>
</html>
