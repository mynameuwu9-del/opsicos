<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Updates - Opsicos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --bg-card: #222;
            --text-primary: #fff;
            --text-secondary: #999;
            --accent: #8B0000;
            --border: #333;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            background: var(--bg-secondary);
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
            color: var(--text-primary);
        }

        .back-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #660000;
            transform: translateY(-2px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 30px;
        }

        .intro {
            text-align: center;
            margin-bottom: 50px;
        }

        .intro h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .intro p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .changelog-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }

        .changelog-item:hover {
            border-color: var(--accent);
            background: rgba(139, 0, 0, 0.05);
        }

        .changelog-item.expanded {
            border-color: var(--accent);
            background: rgba(139, 0, 0, 0.1);
        }

        .changelog-item.expanded:hover {
            transform: none;
        }

        .changelog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .changelog-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .version-badge {
            background: var(--accent);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
        }

        .changelog-title h3 {
            font-size: 22px;
            color: var(--text-primary);
        }

        .type-badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .type-feature {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .type-bugfix {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .type-improvement {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .type-security {
            background: rgba(59, 130, 246, 0.1);
            color: var(--info);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .changelog-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .changelog-content {
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s ease;
            opacity: 0;
        }

        .changelog-content.expanded {
            max-height: none;
            opacity: 1;
            margin-top: 20px;
        }

        .updates-list {
            list-style: none;
            padding: 0;
        }

        .updates-list li {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: start;
            gap: 12px;
        }

        .updates-list li:last-child {
            border-bottom: none;
        }

        .update-bullet {
            font-size: 18px;
            margin-top: 2px;
        }

        .update-text {
            flex: 1;
            line-height: 1.6;
            color: var(--text-primary);
        }

        .expand-indicator {
            font-size: 18px;
            transition: transform 0.3s ease;
            color: var(--accent);
        }

        .changelog-item.expanded .expand-indicator {
            transform: rotate(180deg);
        }

        .changelog-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 5px 0;
        }

        .changelog-title h3 {
            margin: 0;
            font-size: 18px;
        }

        .version-badge {
            font-size: 12px;
            padding: 4px 8px;
        }

        .type-badge {
            font-size: 11px;
            padding: 4px 8px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
            }

            .changelog-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .changelog-meta {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>📢 Updates</h1>
            <a href="/dashboard" class="back-btn">← Back to Dashboard</a>
        </div>
    </div>

    <div class="container">
        <div class="intro">
            <h2>Latest Updates & Features</h2>
            <p>Stay updated with the latest features, improvements, and bug fixes</p>
        </div>

        <div id="changelogContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading changelog...</p>
            </div>
        </div>
    </div>

    <script>
        async function loadChangelog() {
            try {
                const response = await fetch('/api/updates');
                const data = await response.json();

                const container = document.getElementById('changelogContainer');

                if (data.changelogs && data.changelogs.length > 0) {
                    container.innerHTML = data.changelogs.map((changelog, index) => {
                        const typeEmoji = {
                            feature: '🎉',
                            bugfix: '🐛',
                            improvement: '⚡',
                            security: '🔒'
                        };

                        const emoji = typeEmoji[changelog.type] || '📢';
                        const date = new Date(changelog.publishedAt).toLocaleDateString('en-US', {
                            year: 'numeric',
                            month: 'long',
                            day: 'numeric'
                        });

                        return `
                            <div class="changelog-item" onclick="toggleChangelog('${changelog._id}')">
                                <div class="changelog-title-row">
                                    <div class="changelog-title">
                                        <span class="version-badge">v${changelog.version}</span>
                                        <h3>${emoji} ${changelog.title}</h3>
                                    </div>
                                    <div style="display: flex; align-items: center; gap: 15px;">
                                        <span class="type-badge type-${changelog.type}">${changelog.type}</span>
                                        <span class="expand-indicator">▼</span>
                                    </div>
                                </div>
                                
                                <div class="changelog-content" id="content-${changelog._id}">
                                    <div class="changelog-meta">
                                        <span>📅 ${date}</span>
                                        <span>👤 ${changelog.publishedBy}</span>
                                        ${changelog.discordMessageSent ? '<span>✅ Sent to Discord</span>' : ''}
                                    </div>
                                    <ul class="updates-list">
                                        ${changelog.updates.map(update => `
                                            <li>
                                                <span class="update-bullet">⚪️</span>
                                                <span class="update-text">${update}</span>
                                            </li>
                                        `).join('')}
                                    </ul>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <h3>No Updates Yet</h3>
                            <p>Check back later for new updates and features!</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading changelog:', error);
                document.getElementById('changelogContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <h3>Error Loading Changelog</h3>
                        <p>Please try again later</p>
                    </div>
                `;
            }
        }

        // Toggle changelog expansion
        function toggleChangelog(changelogId) {
            const item = document.querySelector(`[onclick="toggleChangelog('${changelogId}')"]`);
            const content = document.getElementById(`content-${changelogId}`);
            const indicator = item.querySelector('.expand-indicator');
            
            if (item.classList.contains('expanded')) {
                // Collapse
                item.classList.remove('expanded');
                content.classList.remove('expanded');
                indicator.textContent = '▼';
            } else {
                // Expand
                item.classList.add('expanded');
                content.classList.add('expanded');
                indicator.textContent = '▲';
            }
        }

        // Load changelog on page load
        loadChangelog();
    </script>
</body>
</html>
