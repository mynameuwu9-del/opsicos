<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stored Knowledge - Opsicos</title>
  <link rel="canonical" href="https://opsicos.onrender.com/stored-knowledge">
  <style>
    :root {
      --primary: #8B0000;
      --primary-dark: #660000;
      --secondary: #CCCCCC;
      --dark: #1a1a1a;
      --darker: #000000;
      --text-primary: #FFFFFF;
      --text-secondary: #CCCCCC;
      --background: #000000;
      --surface: #1a1a1a;
      --border: #333333;
      --success: #28a745;
      --error: #dc3545;
      --warning: #ffc107;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      line-height: 1.6;
      color: var(--text-secondary);
      background-color: var(--background);
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    
    .header h1 {
      color: var(--text-primary);
      font-size: 2rem;
      font-weight: 600;
    }
    
    .header-actions {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .bot-selector {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .bot-selector select {
      background: var(--surface);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
    }
    
    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .search-box input {
      flex: 1;
      background: var(--surface);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
    }
    
    .search-box input:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-primary {
      background: var(--primary);
      color: var(--text-primary);
    }
    
    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }
    
    .btn-secondary {
      background: var(--surface);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    
    .btn-secondary:hover {
      background: var(--dark);
      color: var(--text-primary);
    }
    
    .btn-danger {
      background: var(--error);
      color: var(--text-primary);
    }
    
    .btn-danger:hover {
      background: #c82333;
    }
    
    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }
    
    .knowledge-grid {
      display: grid;
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .knowledge-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s ease;
    }
    
    .knowledge-card:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
    }
    
    .knowledge-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    
    .knowledge-title {
      color: var(--text-primary);
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0;
      flex: 1;
    }
    
    .knowledge-actions {
      display: flex;
      gap: 8px;
      margin-left: 15px;
    }
    
    .knowledge-content {
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 15px;
      max-height: 150px;
      overflow: hidden;
      position: relative;
    }
    
    .knowledge-content.expanded {
      max-height: none;
    }
    
    .knowledge-content::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 30px;
      background: linear-gradient(transparent, var(--surface));
      pointer-events: none;
    }
    
    .knowledge-content.expanded::after {
      display: none;
    }
    
    .knowledge-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #666;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid var(--border);
    }
    
    .expand-btn {
      background: none;
      border: none;
      color: var(--primary);
      cursor: pointer;
      font-size: 12px;
      padding: 4px 0;
      margin-top: 8px;
    }
    
    .expand-btn:hover {
      text-decoration: underline;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
    
    .empty-state h3 {
      color: var(--text-primary);
      margin-bottom: 10px;
    }
    
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 30px;
    }
    
    .pagination button {
      background: var(--surface);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .pagination button:hover:not(:disabled) {
      background: var(--dark);
      color: var(--text-primary);
    }
    
    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .pagination .current {
      background: var(--primary);
      color: var(--text-primary);
      border-color: var(--primary);
    }
    
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    
    .alert-success {
      background: rgba(40, 167, 69, 0.1);
      color: var(--success);
      border: 1px solid rgba(40, 167, 69, 0.3);
    }
    
    .alert-error {
      background: rgba(220, 53, 69, 0.1);
      color: var(--error);
      border: 1px solid rgba(220, 53, 69, 0.3);
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }
    
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top: 2px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .back-link {
      color: var(--text-secondary);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      transition: color 0.3s ease;
    }
    
    .back-link:hover {
      color: var(--primary);
    }
    
    @media (max-width: 768px) {
      .container {
        padding: 15px;
      }
      
      .header {
        flex-direction: column;
        gap: 15px;
        align-items: flex-start;
      }
      
      .header-actions {
        width: 100%;
        justify-content: space-between;
      }
      
      .knowledge-header {
        flex-direction: column;
        gap: 10px;
      }
      
      .knowledge-actions {
        margin-left: 0;
      }
      
      .search-box {
        flex-direction: column;
        gap: 10px;
      }
      
      .search-box input {
        width: 100%;
      }
    }
  </style>

  <!-- Theme Loader - Load theme immediately AFTER inline styles -->
  <link rel="stylesheet" href="/css/theme-switcher.css">
  <script src="/js/theme-loader.js"></script>
</head>
<body>
  <div class="container">
    <div style="display: flex; gap: 20px; margin-bottom: 20px;">
      <a href="/dashboard" class="back-link">← Dashboard</a>
      <a href="/docs" class="back-link">📚 Documentation</a>
      <a href="/knowledge" class="back-link">Knowledge Management</a>
      <a href="/stored-knowledge" class="back-link" style="color: var(--primary);">Stored Knowledge</a>
      <a href="/behavior" class="back-link">🎭 Bot Behavior</a>
      <a href="/bot-smartness" class="back-link">🧠 Bot's Smartness</a>
      <a href="/uptime-status" class="back-link">📊 Uptime Status</a>
      <a href="/features" class="back-link">🔧 Features</a>
      <a href="/special-users" class="back-link">👥 Special Users</a>
      <a href="/playground" class="back-link">🎮 Playground</a>
    </div>
    
    <div class="header">
      <h1>Stored Knowledge</h1>
      <div class="header-actions">
        <div class="bot-selector">
          <label for="botSelect">Select Bot:</label>
          <select id="botSelect">
            <option value="">Loading bots...</option>
          </select>
        </div>
        <a href="/knowledge" class="btn btn-primary">Add New Knowledge</a>
      </div>
    </div>
    
    <div id="alertContainer"></div>
    
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search knowledge entries...">
      <button id="searchBtn" class="btn btn-secondary">Search</button>
    </div>
    
    <div id="loadingContainer" class="loading" style="display: none;">
      <div class="spinner"></div>
      <p>Loading knowledge entries...</p>
    </div>
    
    <div id="knowledgeContainer" class="knowledge-grid"></div>
    
    <div id="paginationContainer" class="pagination"></div>
  </div>

  <script>
    let currentBotId = null;
    let currentPage = 1;
    let totalPages = 1;
    let searchQuery = '';

    document.addEventListener('DOMContentLoaded', function() {
      console.log('🚀 Stored Knowledge page loaded');

      // Check URL params
      const urlParams = new URLSearchParams(window.location.search);
      const botId = urlParams.get('botId');
      if (botId) {
        currentBotId = botId;
        console.log('🔗 Bot ID from URL params:', botId);
      }

      loadBots();
      setupEventListeners();
    });

    function setupEventListeners() {
      const botSelect = document.getElementById('botSelect');
      const searchInput = document.getElementById('searchInput');
      const searchBtn = document.getElementById('searchBtn');

      botSelect.addEventListener('change', function() {
        currentBotId = this.value;
        currentPage = 1;
        console.log('🤖 Bot selected:', currentBotId);
        if (currentBotId) {
          console.log('🔄 Loading knowledge for selected bot...');
          loadKnowledge();
        } else {
          console.log('🧹 Clearing knowledge container (no bot selected)');
          clearKnowledgeContainer();
        }
      });

      searchInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          performSearch();
        }
      });

      searchBtn.addEventListener('click', performSearch);
    }

    function performSearch() {
      searchQuery = document.getElementById('searchInput').value.trim();
      currentPage = 1;
      if (currentBotId) {
        loadKnowledge();
      }
    }

    async function loadBots() {
      try {
        console.log('🔍 Loading bots...');
        const response = await fetch('/bots', {
          credentials: 'include'
        });

        console.log('📡 Bots API response status:', response.status);

        if (!response.ok) {
          const errorText = await response.text();
          console.error('❌ Bots API error:', errorText);
          throw new Error('Failed to load bots');
        }

        const bots = await response.json();
        console.log('🤖 Loaded bots:', bots);

        const botSelect = document.getElementById('botSelect');

        botSelect.innerHTML = '<option value="">Select a bot...</option>';

        bots.forEach(bot => {
          const option = document.createElement('option');
          option.value = bot._id;
          option.textContent = bot.botName || 'Unnamed Bot';
          if (bot._id === currentBotId) {
            option.selected = true;
          }
          botSelect.appendChild(option);
          console.log('➕ Added bot to dropdown:', bot.botName, bot._id);
        });

        console.log('✅ Bot dropdown populated with', bots.length, 'bots');

        if (currentBotId) {
          console.log('🔄 Auto-loading knowledge for pre-selected bot:', currentBotId);
          loadKnowledge();
        }
      } catch (error) {
        console.error('❌ Error loading bots:', error);
        showAlert('Failed to load bots. Please refresh the page.', 'error');
      }
    }

    async function loadKnowledge() {
      if (!currentBotId) {
        console.log('❌ No bot selected, cannot load knowledge');
        return;
      }

      console.log('🔍 Loading knowledge for bot:', currentBotId);
      showLoading(true);

      try {
        const params = new URLSearchParams({
          page: currentPage,
          limit: 10,
          search: searchQuery
        });

        const url = `/knowledge/${currentBotId}?${params}`;
        console.log('📡 Making knowledge API request to:', url);

        const response = await fetch(url, {
          credentials: 'include'
        });

        console.log('📡 Knowledge API response status:', response.status);

        if (!response.ok) {
          const errorText = await response.text();
          console.error('❌ Knowledge API error:', errorText);
          throw new Error('Failed to load knowledge');
        }

        const data = await response.json();
        console.log('📊 Knowledge API response data:', data);
        displayKnowledge(data.knowledge);
        updatePagination(data.pagination);
        
      } catch (error) {
        console.error('Error loading knowledge:', error);
        showAlert('Failed to load knowledge entries.', 'error');
        clearKnowledgeContainer();
      } finally {
        showLoading(false);
      }
    }

    function displayKnowledge(knowledge) {
      const container = document.getElementById('knowledgeContainer');
      
      if (!knowledge || knowledge.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h3>No Knowledge Entries Found</h3>
            <p>Start building your bot's knowledge base by adding some entries.</p>
            <a href="/knowledge.html?botId=${currentBotId}" class="btn btn-primary" style="margin-top: 15px;">Add First Entry</a>
          </div>
        `;
        return;
      }
      
      container.innerHTML = knowledge.map(k => `
        <div class="knowledge-card" data-id="${k._id}">
          <div class="knowledge-header">
            <h3 class="knowledge-title">${escapeHtml(k.title)}</h3>
            <div class="knowledge-actions">
              <button class="btn btn-sm btn-secondary" onclick="editKnowledge('${k._id}')">Edit</button>
              <button class="btn btn-sm btn-danger" onclick="deleteKnowledge('${k._id}', '${escapeHtml(k.title)}')">Delete</button>
            </div>
          </div>
          <div class="knowledge-content" id="content-${k._id}">
            ${escapeHtml(k.content)}
          </div>
          ${k.content.length > 300 ? `<button class="expand-btn" onclick="toggleExpand('${k._id}')">Show more</button>` : ''}
          <div class="knowledge-meta">
            <span>Created: ${new Date(k.createdAt).toLocaleDateString()}</span>
            <span>${k.content.length} characters</span>
          </div>
        </div>
      `).join('');
    }

    function toggleExpand(knowledgeId) {
      const content = document.getElementById(`content-${knowledgeId}`);
      const btn = content.nextElementSibling;
      
      if (content.classList.contains('expanded')) {
        content.classList.remove('expanded');
        btn.textContent = 'Show more';
      } else {
        content.classList.add('expanded');
        btn.textContent = 'Show less';
      }
    }

    function editKnowledge(knowledgeId) {
      window.location.href = `/knowledge.html?botId=${currentBotId}&edit=${knowledgeId}`;
    }

    async function deleteKnowledge(knowledgeId, title) {
      if (!confirm(`Are you sure you want to delete "${title}"? This action cannot be undone.`)) {
        return;
      }
      
      try {
        const response = await fetch(`/knowledge/${currentBotId}/${knowledgeId}`, {
          method: 'DELETE',
          credentials: 'include'
        });
        
        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Failed to delete knowledge');
        }
        
        showAlert('Knowledge entry deleted successfully.', 'success');
        loadKnowledge(); // Reload the list
        
      } catch (error) {
        console.error('Error deleting knowledge:', error);
        showAlert(error.message, 'error');
      }
    }

    function updatePagination(pagination) {
      const container = document.getElementById('paginationContainer');
      
      if (pagination.pages <= 1) {
        container.innerHTML = '';
        return;
      }
      
      totalPages = pagination.pages;
      currentPage = pagination.current;
      
      let paginationHTML = '';
      
      // Previous button
      paginationHTML += `<button ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">Previous</button>`;
      
      // Page numbers
      for (let i = 1; i <= totalPages; i++) {
        if (i === currentPage) {
          paginationHTML += `<button class="current">${i}</button>`;
        } else if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
          paginationHTML += `<button onclick="changePage(${i})">${i}</button>`;
        } else if (i === currentPage - 3 || i === currentPage + 3) {
          paginationHTML += `<span>...</span>`;
        }
      }
      
      // Next button
      paginationHTML += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">Next</button>`;
      
      container.innerHTML = paginationHTML;
    }

    function changePage(page) {
      if (page >= 1 && page <= totalPages && page !== currentPage) {
        currentPage = page;
        loadKnowledge();
      }
    }

    function showLoading(show) {
      const loadingContainer = document.getElementById('loadingContainer');
      const knowledgeContainer = document.getElementById('knowledgeContainer');
      
      if (show) {
        loadingContainer.style.display = 'block';
        knowledgeContainer.style.display = 'none';
      } else {
        loadingContainer.style.display = 'none';
        knowledgeContainer.style.display = 'block';
      }
    }

    function clearKnowledgeContainer() {
      document.getElementById('knowledgeContainer').innerHTML = '';
      document.getElementById('paginationContainer').innerHTML = '';
    }

    function showAlert(message, type) {
      const alertContainer = document.getElementById('alertContainer');
      const alert = document.createElement('div');
      alert.className = `alert alert-${type}`;
      alert.textContent = message;
      
      alertContainer.innerHTML = '';
      alertContainer.appendChild(alert);
      
      if (type === 'success') {
        setTimeout(() => {
          alert.remove();
        }, 5000);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
  <script src="/js/language-translator.js"></script>
</body>
</html>
